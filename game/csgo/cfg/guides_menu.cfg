// 地图指南选择菜单 - 8张服役地图（中文显示）
sv_allow_annotations_access_level 2

// 每张地图对应一个指南（指南名称请根据实际保存的名称调整）
alias load_dust2    "annotation_load de_dust2; say 已加载 炙热沙城 II 地图指南; exec showmenu"
alias load_inferno  "annotation_load de_inferno; say 已加载 炼狱小镇 地图指南; exec showmenu"
alias load_mirage   "annotation_load de_mirage; say 已加载 荒漠迷城 地图指南; exec showmenu"
alias load_nuke     "annotation_load de_nuke; say 已加载 核子危机 地图指南; exec showmenu"
alias load_ancient  "annotation_load de_ancient; say 已加载 远古遗迹 地图指南; exec showmenu"
alias load_anubis   "annotation_load de_anubis; say 已加载 阿努比斯 地图指南; exec showmenu"
alias load_vertigo  "annotation_load de_vertigo; say 已加载 殒命大厦 地图指南; exec showmenu"
alias load_overpass "annotation_load de_overpass; say 已加载 死亡游乐园 地图指南; exec showmenu"
alias load_train    "annotation_load de_train; say 已加载 列车停放站 地图指南; exec showmenu"

// 显示菜单的命令
alias guide_menu "exec guides_menu"

