//----------------------------------------------------- 重置为竞技模式设置 -------------------------------------------------
// 用于恢复官方竞技/常规模式参数
// 在控制台输入 exec reset 即可执行
//------------------------------------------------------------------------------------------------------------------------

//------------------------------------------------ 控制台清除部分绑键（可选）------------------------------------------------
// 如需清除跑图绑键，可取消以下命令的注释
// unbind f5; unbind f6; unbind f7; unbind f8; unbind f9; unbind v; unbind c; unbind ,; unbind f2; unbind f1
//------------------------------------------------------------------------------------------------------------------------

//------------------------------------------------ 竞技模式参数 ----------------------------------------------------------
ammo_grenade_limit_total 4          					// 投掷物最大携带数量恢复为4
bot_kick                            					// 移除所有机器人
bot_stop 0                          					// 机器人恢复移动
bot_join_after_player 0             					// BOT可正常加入
bot_chatter 1                       					// 恢复BOT语音
cl_versus_intro 1                   					// 恢复开场动画
sv_maxplayers 10                    					// 最大玩家数量恢复为默认（可根据需要调整）
mp_autokick 1                       					// 恢复自动踢出挂机/友伤玩家
mp_autoteambalance 1                					// 恢复队伍平衡
mp_buy_anywhere 0                   					// 仅在购买区购买
mp_buytime 15                       					// 购买时间恢复为15秒
mp_ct_default_grenades ""           					// CT方不自带投掷物
mp_death_drop_grenade 1             					// 死亡后掉落投掷物
mp_death_drop_gun 1                 					// 死亡掉枪
mp_death_drop_defuser 1             					// 死亡掉落钳子
mp_drop_knife_enable 0              					// 不允许丢弃刀
mp_free_armor 0                     					// 不自带护甲
mp_freezetime 15                    					// 开局冻结时间恢复为15秒
mp_friendlyfire 1                   					// 恢复友伤（竞技模式默认开启）
mp_ignore_round_win_conditions 0    					// 启用胜利条件
mp_limitteams 2                     					// 队伍最大人数差恢复为2
mp_maxmoney 16000                   					// 最大金钱恢复为16000
mp_maxrounds 25                     					// 最大回合数恢复为30（竞技模式）
mp_respawn_on_death_ct 0            					// CT死后不允许复活
mp_respawn_on_death_t 0             					// T死后不允许复活
mp_respawnwavetime_ct 0             					// 无复活波次
mp_respawnwavetime_t 0              					// 无复活波次
mp_roundtime 1.92                   					// 回合时间恢复为1分55秒（竞技模式）
mp_roundtime_defuse 1.92            					// 竞技模式回合时间
mp_roundtime_hostage 1.92           					// 人质模式回合时间
mp_solid_teammates 1                					// 不允许穿过队友身体（与竞技一致）
mp_spectators_max 5                 					// 最大观察者数量恢复为5
mp_startmoney 800                   					// 初始金钱恢复为800
mp_t_default_grenades ""            					// T方不自带投掷物
mp_t_default_primary ""             					// T不自带主武器
mp_t_default_secondary ""           					// T不自带副武器
mp_ct_default_primary ""            					// CT不自带主武器
mp_ct_default_secondary ""          					// CT不自带副武器
mp_team_intro_time 1                					// 恢复队伍开场动画
mp_weapons_allow_typecount 0        					// 禁止无限购买同类武器
mp_warmup_end                       					// 结束热身（如已在热身）
sv_alltalk 0                        					// 仅队友语音
sv_cheats 0                         					// 关闭作弊
sv_falldamage_scale 1               					// 恢复摔落伤害
sv_grenade_trajectory_prac_pipreview 0 					// 关闭投掷物预览窗口
sv_grenade_trajectory_prac_trailtime 0  				// 关闭投掷物轨迹
sv_grenade_trajectory_time_spectator 0  				// 关闭弹痕显示
sv_infinite_ammo 0                  					// 恢复有限弹药
sv_regeneration_force_on 0          					// 关闭自动回血
sv_showimpacts 0                    					// 关闭子弹命中显示
sv_showimpacts_time 0               					// 关闭命中显示时间

mp_restartgame 1                    					// 重启房间使设置生效

//------------------------------------------------ 提示信息 ---------------------------------------------------------------
say 已重置为竞技模式设置，房间参数已恢复。
echoln "════════════════════════════════════"
echoln "  房间已恢复为正常竞技模式参数"
echoln "  如有需要，请重新启动游戏或换图以确保完全生效"
echoln "════════════════════════════════════"